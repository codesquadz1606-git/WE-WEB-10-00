    .box-1{

    .box-4{

    .box-1,.box-2,.box-3,.box-4{

    }

        display: flex;
        gap: 30px;
    }

    .screen-1 .navbar ul li{
        list-style: none;
        font-size: 1.3rem;
    }

    .screen-2 .navbar{
        display: flex;
        justify-content: space-between;
        align-items: center;

    .screen-1,.screen-2{

    main .s-1 .container{

    @media (min-width:1051px) {

    }

    @media (max-width:1050px) {
        .screen-2{

        }

        height: 200px;
        background-color: black;
