  <style>
    :root {
      --bgColor--: red;
      --textColor--: green;
      --flex--: flex;
    }

    /* .box{

    @keyframes moveBox {
      0% {
        top: 0px;
        left: 0px;
      }

      25% {
        top: 200px;
        left: 0px;
      }

      50% {
        top: 200px;
        left: 400px;
      }

      75% {
        top: 0px;
        left: 400px;
      }

      100% {
        top: 0px;
        left: 0px;
      }
    }

    .carousel {
      width: 95%;
      height: 700px;
      border: 2px solid black;
      margin: auto;
      border-radius: 30px;

      animation: carousel 15s ease-in-out infinite alternate;
    }

    @keyframes carousel {
      0% {
        background-image: url(./assets/1.jpg);
        background-position: center;
        background-size: cover;
      }

      50% {
        background-image: url(./assets/2.jpg);
        background-position: center;
        background-size: cover;
      }

      100% {
        background-image: url(./assets/3.webp);
        background-position: center;
        background-size: cover;
      }
    }

    .sq {
      width: 300px;
      height: 300px;
      background-color: var(--bgColor--);
      color: var(--textColor--);
    }

    .box {
      width: 100px;
      height: 150px;
    }

    #box-1 {
      background-color: black;
    }
    #box-2 {
      background-color: green;
    }
    #box-3 {
      background-color: red;
    }
    #box-4 {
      background-color: yellow;
    }
    #box-5 {
      background-color: blue;
    }
    #box-6 {
      background-color: rgb(131, 116, 119);
    }
    #box-7 {
      background-color: brown;
    }
    #box-8 {
      background-color: rgb(142, 50, 50);
    }

    .container{
        display: flex;
        justify-content: space-between;
    }

    /* .box:nth-child(4n+1){

    .box:last-child{
        color: blue;
    }
    .box:first-child{
        color: blue;
    }
