<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheli Class</title>
</head>
<body>
    <!-- 
        Closed Tag : A tag which has open & close both
        EnClose Tag : A tag which has only open
    -->

    <!-- 
        Heading Tag : h1 to h6

        h1 -------- h6
        bigger-----smaller
    -->

    <h1>This is Heading Tag</h1>
    <h2>This is Heading Tag</h2>
    <h3>This is Heading Tag</h3>
    <h4>This is Heading Tag</h4>
    <h5>This is Heading Tag</h5>
    <h6>This is Heading Tag</h6>
    <hr>
    <h1>Hello</h1>
    <!-- 
        line break tags : br & hr
    -->
    <hr width="30%">
    <!-- br means line break tag -->
    hello <br>
    my name is Ayush

    <!-- hr means drawing horizontal line -->
    <hr>

    <h1>Media Tag: img , audio & video</h1>
    <!-- 
        Note : Also place your asset near your html file.
    -->
    <img width="300px" src="assets/image.jpg" alt="Some error">
    <audio controls src="assets/audio.mp3"></audio>
    <video controls width="300px" src="assets/video.mp4"></video>
</body>
</html>
